<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E7D32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B5E20;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="16" cy="16" r="14" fill="url(#logoGradient)" stroke="#FFFFFF" stroke-width="1"/>
  
  <!-- Chicken Icon -->
  <g transform="translate(8, 8)">
    <!-- Chicken Body -->
    <ellipse cx="8" cy="12" rx="6" ry="4" fill="#FFFFFF" opacity="0.9"/>
    
    <!-- Chicken Head -->
    <circle cx="8" cy="6" r="3" fill="#FFFFFF" opacity="0.9"/>
    
    <!-- Beak -->
    <polygon points="8,4 6,5 10,5" fill="#FF8F00"/>
    
    <!-- Eye -->
    <circle cx="9" cy="5" r="0.8" fill="#2E7D32"/>
    
    <!-- Comb -->
    <path d="M6,4 Q8,2 10,4" stroke="#FF4444" stroke-width="1" fill="none"/>
    
    <!-- Wing -->
    <ellipse cx="6" cy="10" rx="2" ry="3" fill="#F5F5F5" opacity="0.8"/>
    
    <!-- Legs -->
    <line x1="7" y1="16" x2="7" y2="18" stroke="#FF8F00" stroke-width="1"/>
    <line x1="9" y1="16" x2="9" y2="18" stroke="#FF8F00" stroke-width="1"/>
    
    <!-- Feet -->
    <line x1="6" y1="18" x2="10" y2="18" stroke="#FF8F00" stroke-width="1"/>
  </g>
</svg>

